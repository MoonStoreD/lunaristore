<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunariStore</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f0f,#1f1f1f);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#333;
    margin:auto;
}

h1{
    margin-top:15px;
}

.link{
    display:block;
    width:250px;
    margin:10px auto;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#ff3b3b;
    transition:0.2s;
}

.link:hover{
    background:#ff1c1c;
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="logo"></div>

<h1>LunariStore</h1>
<p>Streetwear & Apparel</p>

<a class="link" href="#">Chat WhatsApp</a>
<a class="link" href="#">TikTok Shop</a>
<a class="link" href="#">Shopee</a>
<a class="link" href="#">Instagram</a>

<div class="footer">
© 2026 LunariStore
</div>

</div>

</body>
</html>
